# Local development — run from repo root:
#   docker compose -f apps/email-listener/docker-compose.yaml up --build
# or simply: pnpm dev  (see root package.json)
services:
  email-listener:
    build:
      context: ../..
      dockerfile: apps/email-listener/Dockerfile
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      LOG_LEVEL: DEBUG
      # Inside the container, the host's Supabase (published on the host) is reached
      # via host.docker.internal. This overrides .env (which uses localhost:54321 so
      # the listener also works when run directly on the host via `uv run uvicorn`).
      SUPABASE_URL: http://host.docker.internal:54321
    env_file:
      - path: .env
        required: false
    develop:
      watch:
        - action: sync+restart
          path: ./app
          target: /app/app
