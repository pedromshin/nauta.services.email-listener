name: Deploy — Email Listener (Production)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/email-listener/**"
      - ".github/workflows/deploy-email-listener.yml"

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: nauta-services-email-listener
  ECS_CLUSTER: nauta-services-email-listener
  ECS_SERVICE: nauta-services-email-listener
  IMAGE_TAG: latest

permissions: {}

concurrency:
  group: deploy-email-listener-production
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/email-listener
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run mypy app
      - run: uv run pytest

  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          docker build \
            -f apps/email-listener/Dockerfile \
            -t ${{ steps.ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG \
            .

      - name: Trivy scan (CRITICAL/HIGH blocks)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push image
        run: docker push ${{ steps.ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE

      - name: Smoke test
        if: vars.PRODUCTION_HEALTH_URL != ''
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "${{ vars.PRODUCTION_HEALTH_URL }}")
          if [ "$STATUS" != "200" ]; then
            echo "::error::Production health check failed (HTTP $STATUS)."
            exit 1
          fi
          echo "Production is healthy (HTTP $STATUS)."
